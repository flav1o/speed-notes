<app-settings></app-settings>
<app-navbar></app-navbar>

<section id="notepad-wrapper" [ngClass]="{'nightbackground': userData.userSettings.background == 'night'}">
    <div class="dimmer"></div>
    <div class="line-counter" [ngClass]="{'removeNumbers': !userData.userSettings.lineCounter}">
        <!-- Nº LINES -->
    </div>
    <textarea autosize id="content" cols="80" [(ngModel)]="contentTextArea" (input)="checkNumLines(textContent.value)" #textContent></textarea>
</section>
